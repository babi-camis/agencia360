        body {

            background-color: #f8fafc; /* slate-50 */

        /* Oculta tudo na impressão, exceto o documento alvo */

            body { background: white !important; }
            nav, .no-print { display: none !important; }
            main { margin-left: 0 !important; padding: 0 !important; width: 100% !important; overflow: visible !important; }
            .print-document { box-shadow: none !important; border: none !important; max-width: 100% !important; margin: 0 !important; }

                cnpj: '00.111.222/0001-33',

        function App() {
            // Main States
            const [activeTab, setActiveTab] = useState('dashboard');
            const [clients, setClients] = useState(initialClients);
            const [selectedClient, setSelectedClient] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            
            // Team States
            const [team, setTeam] = useState([
                { id: 1, name: 'Ana Costa', role: 'Customer Success (CS)', accessLevel: 'Operacional', email: 'ana.costa@agencia.com', status: 'Ativo' },
                { id: 2, name: 'Carlos Mendes', role: 'Gestor de Tráfego', accessLevel: 'Líder', email: 'carlos.mendes@agencia.com', status: 'Ativo' },
                { id: 3, name: 'Roberto Almeida', role: 'Customer Success (CS)', accessLevel: 'Operacional', email: 'roberto@agencia.com', status: 'Ativo' },
                { id: 4, name: 'Felipe Silva', role: 'Gestor de Tráfego', accessLevel: 'Operacional', email: 'felipe@agencia.com', status: 'Ativo' },
                { id: 5, name: 'Admin Diretoria', role: 'Diretor Geral', accessLevel: 'Master', email: 'admin@agencia.com', status: 'Ativo' }
            ]);
            
            const [isTeamFormOpen, setIsTeamFormOpen] = useState(false);
            const [editingTeamMember, setEditingTeamMember] = useState(null);
            const [teamFormData, setTeamFormData] = useState({ name: '', role: '', accessLevel: 'Operacional', email: '', status: 'Ativo' });

            // Report States
            const [reportConfig, setReportConfig] = useState({ client: '', startDate: '', endDate: '' });
            const [generatedReport, setGeneratedReport] = useState(null);

            // Client Form States
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            const [formData, setFormData] = useState({
                name: '', franchiseName: '', legalResponsible: '', address: '', cs: '', trafficManager: '',
                monthlyGoogle: 0, monthlyMeta: 0, pixFrequency: 'Semanal (1x)', pixDays: '', leadsGoal: 0, cplTarget: 0, satisfactionIndex: 'Satisfied',
                audience: '', region: '', notes: '', storeStatus: 'Aberto', inaugurationDate: '', awarenessStartDate: '', performanceStartDate: '',
                cnpj: '', website: '', instagram: '', whatsapp: ''
            });

            const getSatisfactionColor = (status) => {
                switch(status) {
                    case 'Satisfied': return 'text-emerald-500 bg-emerald-50 border-emerald-200';
                    case 'Neutral': return 'text-amber-500 bg-amber-50 border-amber-200';
                    case 'Needs Attention': return 'text-rose-500 bg-rose-50 border-rose-200';
                    default: return 'text-slate-500 bg-slate-50 border-slate-200';
                }
            };

            const SatisfactionBadge = ({ status }) => (
                <span className={`px-2.5 py-1 rounded-full text-xs font-semibold border ${getSatisfactionColor(status)} flex items-center gap-1.5 w-max`}>
                    {status === 'Satisfied' && <CheckCircle size={14} />}
                    {status === 'Needs Attention' && <AlertCircle size={14} />}
                    {status === 'Neutral' && <Activity size={14} />}
                    {status === 'Satisfied' ? 'Satisfeito' : status === 'Needs Attention' ? 'Atenção Requerida' : 'Neutro'}
                </span>
            );

            const calculateFinances = (google, meta) => {
                const googleNum = Number(google) || 0;
                const metaNum = Number(meta) || 0;
                const totalMonthly = googleNum + metaNum;
                
                const weeklyGoogle = googleNum / 4;
                const weeklyMetaGross = metaNum / 4;
                const weeklyMetaNet = weeklyMetaGross * (1 - 0.1215); // Desconto de 12,15%
                const totalWeeklyNet = weeklyGoogle + weeklyMetaNet;

                return { totalMonthly, weeklyGoogle, weeklyMetaGross, weeklyMetaNet, totalWeeklyNet };
            };

            const handleOpenForm = (client = null) => {
                if (client) {
                    setEditingClient(client.id);
                    setFormData({
                        name: client.companyName,
                        franchiseName: client.franchiseId,
                        legalResponsible: client.legalResponsible,
                        address: client.address,
                        cs: client.assignedTeam.cs,
                        trafficManager: client.assignedTeam.trafficManager,
                        monthlyGoogle: client.investmentDetails.monthlyGoogle,
                        monthlyMeta: client.investmentDetails.monthlyMeta,
                        pixFrequency: client.investmentDetails.pixFrequency || 'Semanal (1x)',
                        pixDays: client.investmentDetails.pixDays || '',
                        leadsGoal: client.performanceMetrics.leadsGoal,
                        cplTarget: client.performanceMetrics.cplTarget,
                        satisfactionIndex: client.satisfactionIndex,
                        audience: client.targeting?.audience || '',
                        region: client.targeting?.region || '',
                        notes: client.notes || '',
                        storeStatus: client.storeStatus || 'Aberto',
                        inaugurationDate: client.inaugurationDate || '',
                        awarenessStartDate: client.awarenessStartDate || '',
                        performanceStartDate: client.performanceStartDate || '',
                        cnpj: client.cnpj || '',
                        website: client.website || '',
                        instagram: client.instagram || '',
                        whatsapp: client.whatsapp || ''
                    });
                } else {
                    setEditingClient(null);
                    setFormData({
                        name: '', franchiseName: '', legalResponsible: '', address: '', cs: '', trafficManager: '',
                        monthlyGoogle: 0, monthlyMeta: 0, pixFrequency: 'Semanal (1x)', pixDays: '', leadsGoal: 0, cplTarget: 0, satisfactionIndex: 'Satisfied',
                        audience: '', region: '', notes: '', storeStatus: 'Aberto', inaugurationDate: '', awarenessStartDate: '', performanceStartDate: '',
                        cnpj: '', website: '', instagram: '', whatsapp: ''
                    });
                }
                setIsFormOpen(true);
            };

            const handleSaveClient = (e) => {
                e.preventDefault();
                const newClientData = {
                    companyName: formData.name,
                    franchiseId: formData.franchiseName || `NEW-${Math.floor(Math.random()*1000)}`,
                    legalResponsible: formData.legalResponsible,
                    address: formData.address,
                    storeStatus: formData.storeStatus,
                    inaugurationDate: formData.inaugurationDate,
                    awarenessStartDate: formData.awarenessStartDate,
                    performanceStartDate: formData.performanceStartDate,
                    servicesContracted: ['Gestão de Tráfego'], 
                    investmentDetails: {
                        monthlyGoogle: Number(formData.monthlyGoogle),
                        monthlyMeta: Number(formData.monthlyMeta),
                        pixFrequency: formData.pixFrequency,
                        pixDays: formData.pixDays
                    },
                    performanceMetrics: {
                        leadsGoal: Number(formData.leadsGoal),
                        leadsGenerated: editingClient ? clients.find(c => c.id === editingClient).performanceMetrics.leadsGenerated : 0,
                        cplTarget: Number(formData.cplTarget),
                        currentCpl: editingClient ? clients.find(c => c.id === editingClient).performanceMetrics.currentCpl : 0,
                        salesClosed: editingClient ? clients.find(c => c.id === editingClient).performanceMetrics.salesClosed : 0
                    },
                    targeting: { audience: formData.audience, region: formData.region },
                    notes: formData.notes,
                    cnpj: formData.cnpj, website: formData.website, instagram: formData.instagram, whatsapp: formData.whatsapp,
                    satisfactionIndex: formData.satisfactionIndex,
                    assignedTeam: { cs: formData.cs, trafficManager: formData.trafficManager },
                    createdAt: editingClient ? clients.find(c => c.id === editingClient).createdAt : new Date().toISOString().split('T')[0]
                };

                if (editingClient) {
                    setClients(clients.map(c => c.id === editingClient ? { ...c, ...newClientData } : c));
                } else {
                    setClients([...clients, { ...newClientData, id: clients.length + 1 }]);
                }
                setIsFormOpen(false);
            };

            const totalInvestment = clients.reduce((acc, curr) => acc + curr.investmentDetails.monthlyGoogle + curr.investmentDetails.monthlyMeta, 0);
            const totalLeads = clients.reduce((acc, curr) => acc + curr.performanceMetrics.leadsGenerated, 0);
            const averageCpl = (clients.reduce((acc, curr) => acc + curr.performanceMetrics.currentCpl, 0) / (clients.length || 1)).toFixed(2);
            const clientsNeedingAttention = clients.filter(c => c.satisfactionIndex === 'Needs Attention').length;
            const activeStores = clients.filter(c => c.storeStatus === 'Aberto' || !c.storeStatus).length;
            const inauguratingStores = clients.filter(c => c.storeStatus === 'Em Inauguração').length;

            const DashboardView = () => (
                <div className="space-y-6">
                    <h2 className="text-2xl font-bold text-slate-800">Visão Geral da Agência</h2>
                    
                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

                            <div>
                                <p className="text-sm font-medium text-slate-500">Investimento Gerenciado</p>

                            </div>
                        </div>

                            <div>
                                <p className="text-sm font-medium text-slate-500">Leads Gerados (Mês)</p>

                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">

                            <div>
                                <p className="text-sm font-medium text-slate-500">CPL Médio Global</p>
                                <h3 className="text-2xl font-bold text-slate-800">R$ {averageCpl}</h3>

                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">

                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">

                    </div>

                    {/* Charts Area */}

                            <div className="h-72">

                                    <LineChart data={mockPerformanceData}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748b'}} />
                                        <YAxis yAxisId="left" axisLine={false} tickLine={false} tick={{fill: '#64748b'}} />
                                        <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} tick={{fill: '#64748b'}} />

                                        <Line yAxisId="right" type="monotone" dataKey="investimento" stroke="#3b82f6" strokeWidth={3} dot={{r: 4}} name="Investimento (R$)" />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h3 className="text-lg font-bold text-slate-800 mb-4">Status da Carteira de Clientes</h3>
                            <div className="space-y-4">
                                {['Satisfied', 'Neutral', 'Needs Attention'].map((status) => {
                                    const count = clients.filter(c => c.satisfactionIndex === status).length;
                                    const percent = clients.length ? (count / clients.length) * 100 : 0;
                                    const colors = { 'Satisfied': 'bg-emerald-500', 'Neutral': 'bg-amber-500', 'Needs Attention': 'bg-rose-500' };
                                    const labels = { 'Satisfied': 'Saudáveis / Satisfeitos', 'Neutral': 'Acompanhamento Necessário', 'Needs Attention': 'Risco de Churn / Críticos' };
                                    
                                    return (
                                        <div key={status}>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span className="font-medium text-slate-700">{labels[status]}</span>
                                                <span className="text-slate-500">{count} contas ({percent.toFixed(0)}%)</span>
                                            </div>
                                            <div className="w-full bg-slate-100 rounded-full h-2">
                                                <div className={`${colors[status]} h-2 rounded-full`} style={{ width: `${percent}%` }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const ClientsView = () => (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Franquias & Contas</h2>
                            <p className="text-sm text-slate-500 mt-1">Gerencie a carteira de clientes, orçamentos e responsáveis.</p>
                        </div>
                        <button onClick={() => handleOpenForm()} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm">
                            <Plus size={18} /> Nova Conta
                        </button>
                    </div>

                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-4 border-b border-slate-200 flex gap-4 bg-slate-50">
                            <div className="relative flex-1">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />

                                    type="text" placeholder="Buscar franquia, marca ou ID..." 
                                    value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}

                                />
                            </div>
                        </div>
                        
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200">
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Empresa / Cliente</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Status / Início</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Squad Alocada</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Orçamento (Mês)</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Saúde da Conta</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {clients.filter(c => c.companyName.toLowerCase().includes(searchTerm.toLowerCase()) || c.franchiseId.toLowerCase().includes(searchTerm.toLowerCase())).map((client) => (
                                        <tr key={client.id} className="hover:bg-slate-50/80 transition-colors cursor-pointer" onClick={() => setSelectedClient(client)}>
                                            <td className="p-4">
                                                <div className="font-semibold text-slate-800">{client.companyName}</div>
                                                <div className="text-xs text-slate-500 font-medium">{client.franchiseId || 'Sem ID'}</div>
                                            </td>
                                            <td className="p-4">
                                                {client.storeStatus === 'Em Inauguração' ? (
                                                    <span className="px-2 py-1 bg-amber-100 text-amber-700 text-[10px] font-bold rounded flex items-center gap-1 w-max"><Flag size={10}/> EM INAUGURAÇÃO</span>
                                                ) : (
                                                    <span className="text-sm text-slate-600">Em Operação</span>
                                                )}
                                            </td>
                                            <td className="p-4">
                                                <div className="flex flex-col gap-1">
                                                    <span className="text-xs font-medium text-slate-600 flex items-center gap-1"><span className="bg-blue-100 text-blue-700 px-1.5 rounded text-[10px] font-bold">CS</span> {client.assignedTeam.cs}</span>
                                                    <span className="text-xs font-medium text-slate-600 flex items-center gap-1"><span className="bg-purple-100 text-purple-700 px-1.5 rounded text-[10px] font-bold">TR</span> {client.assignedTeam.trafficManager}</span>
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <div className="text-sm font-semibold text-slate-800">{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(client.investmentDetails.monthlyGoogle + client.investmentDetails.monthlyMeta)}</div>
                                                <div className="text-xs text-slate-500">Google + Meta</div>
                                            </td>
                                            <td className="p-4">
                                                <SatisfactionBadge status={client.satisfactionIndex} />

                                <button form="team-form" type="submit" className="px-5 py-2.5 text-sm font-bold text-white bg-slate-800 rounded-lg hover:bg-slate-900 transition-colors shadow-sm">{editingTeamMember ? 'Salvar Edição' : 'Adicionar Colaborador'}</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 flex">
                    {/* Sidebar */}
                    <nav className="w-64 bg-slate-900 text-slate-300 p-4 flex flex-col fixed h-full z-20 no-print">
                        <div className="flex items-center gap-2 mb-10 px-2 pt-4">
                            <div className="bg-blue-500 p-2 rounded-lg"><TrendingUp size={24} className="text-white" /></div>
                            <div>
                                <h1 className="text-xl font-bold text-white leading-tight">Agência360</h1>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest">Painel Master</p>
                            </div>
                        </div>

                        <div className="space-y-2 flex-1">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <LayoutDashboard size={20} /> <span className="font-medium">Dashboard</span>
                            </button>
                            <button onClick={() => setActiveTab('clients')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'clients' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <Building2 size={20} /> <span className="font-medium">Franquias & Contas</span>
                            </button>
                            <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'reports' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <FileText size={20} /> <span className="font-medium">Relatórios</span>
                            </button>
                            <div className="pt-4 mt-4 border-t border-slate-800/50">
                                <button onClick={() => setActiveTab('team')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'team' ? 'bg-slate-700 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                    <Shield size={20} /> <span className="font-medium">Equipe & Acessos</span>
                                </button>
                            </div>
                        </div>

                        <div className="border-t border-slate-800 pt-4 mt-auto">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-sm font-bold text-white">AD</div>
                                <div>
                                    <p className="text-sm font-medium text-white">Admin Master</p>
                                    <p className="text-xs text-slate-500">Diretoria</p>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-1 ml-64 p-8 overflow-y-auto w-full">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && <DashboardView />}
                            {activeTab === 'clients' && <ClientsView />}
                            {activeTab === 'team' && <TeamView />}
                            {activeTab === 'reports' && <ReportsView />}
                        </div>
                    </main>

                    {/* Render Modals */}
                    <ClientDetailsModal />
                    <ClientFormModal />
                    <TeamFormModal />
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
