        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [clients, setClients] = useState(initialClients);
            const [selectedClient, setSelectedClient] = useState(null);

                { id: 4, name: 'Roberto Almeida', role: 'Customer Success (CS)', accessLevel: 'Operacional', email: 'roberto@agencia.com', status: 'Ativo' },
                { id: 5, name: 'Felipe Silva', role: 'Gestor de Tráfego', accessLevel: 'Operacional', email: 'felipe@agencia.com', status: 'Ativo' }
            ]);
            
            // Simulador: O usuário ativo padrão é o ID 1 (Admin)
            const [activeUserId, setActiveUserId] = useState(1);
            const currentUser = team.find(m => m.id === activeUserId);
            const isMaster = currentUser.accessLevel === 'Master';

            // Filtro Inteligente
            const filteredClients = isMaster ? clients : clients.filter(c => c.assignedTeam.cs === currentUser.name || c.assignedTeam.trafficManager === currentUser.name);

            // Modals and Forms
            const [isTeamFormOpen, setIsTeamFormOpen] = useState(false);
            const [editingTeamMember, setEditingTeamMember] = useState(null);
            const [teamFormData, setTeamFormData] = useState({ name: '', role: '', accessLevel: 'Operacional', email: '', status: 'Ativo' });

            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            const [formData, setFormData] = useState({
                name: '', franchiseName: '', legalResponsible: '', address: '', cs: '', trafficManager: '',
                monthlyGoogle: 0, monthlyMeta: 0, pixFrequency: 'Semanal (1x)', pixDays: [], leadsGoal: 0, cplTarget: 0, satisfactionIndex: 'Satisfied',
                audience: '', region: '', targetAge: '', trafficNotes: '', csNotes: '', generalNotes: '', storeStatus: 'Aberto', inaugurationDate: '', awarenessStartDate: '', performanceStartDate: '',
                cnpj: '', website: '', instagram: '', whatsapp: ''
            });

            const getSatisfactionColor = (status) => {
                switch(status) {
                    case 'Satisfied': return 'text-emerald-500 bg-emerald-50 border-emerald-200';
                    case 'Neutral': return 'text-amber-500 bg-amber-50 border-amber-200';
                    case 'Needs Attention': return 'text-rose-500 bg-rose-50 border-rose-200';
                    default: return 'text-slate-500 bg-slate-50 border-slate-200';
                }
            };

                <span className={`px-2.5 py-1 rounded-full text-xs font-semibold border ${getSatisfactionColor(status)} flex items-center gap-1.5 w-max`}>
                    {status === 'Satisfied' && <CheckCircle size={14} />}
                    {status === 'Needs Attention' && <AlertCircle size={14} />}
                    {status === 'Neutral' && <Activity size={14} />}
                    {status === 'Satisfied' ? 'Satisfeito' : status === 'Needs Attention' ? 'Atenção Requerida' : 'Neutro'}
                </span>
            );

            const calculateFinances = (google, meta) => {
                const googleNum = Number(google) || 0;
                const metaNum = Number(meta) || 0;
                return {
                    totalMonthly: googleNum + metaNum,
                    weeklyGoogle: googleNum / 4,
                    weeklyMetaGross: metaNum / 4,
                    weeklyMetaNet: (metaNum / 4) * (1 - 0.1215)
                };
            };

            const DashboardView = () => {
                const totalInvestment = filteredClients.reduce((acc, curr) => acc + curr.investmentDetails.monthlyGoogle + curr.investmentDetails.monthlyMeta, 0);
                const totalLeads = filteredClients.reduce((acc, curr) => acc + curr.performanceMetrics.leadsGenerated, 0);
                const averageCpl = filteredClients.length ? (filteredClients.reduce((acc, curr) => acc + curr.performanceMetrics.currentCpl, 0) / filteredClients.length).toFixed(2) : "0.00";
                const clientsNeedingAttention = filteredClients.filter(c => c.satisfactionIndex === 'Needs Attention').length;
                const activeStores = filteredClients.filter(c => c.storeStatus === 'Aberto' || !c.storeStatus).length;
                const inauguratingStores = filteredClients.filter(c => c.storeStatus === 'Em Inauguração').length;

                    <div className="space-y-6">
                        <div className="flex justify-between items-end">

                                <h2 className="text-2xl font-bold text-slate-800">Visão Geral da Agência</h2>

                            </div>
                        </div>

                                <div className="h-72">
                                    <ResponsiveContainer width="100%" height="100%">

                            </div>
                        </div>

                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200">

                                                )}

                                                </div>
                                            </td>
                                            <td className="p-4">

                                                <div className="md:col-span-2"><label className="block text-xs font-semibold text-slate-600 mb-1">Idade Alvo</label><input type="text" value={formData.targetAge} onChange={e => setFormData({...formData, targetAge: e.target.value})} className="w-full p-2.5 border border-slate-300 rounded-lg outline-none" placeholder="Ex: 25 a 45 anos"/></div>
                                            </div>
                                            
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 pt-4 border-t border-slate-100">
                                                <div>
                                                    <label className="block text-xs font-bold text-blue-700 mb-1 flex justify-between items-center">Obs: Tráfego {!canEditTraffic && <span className="text-[9px] text-slate-400 font-normal uppercase bg-slate-200 px-1 rounded flex items-center gap-1"><Lock size={10}/></span>}</label>
                                                    <textarea readOnly={!canEditTraffic} value={formData.trafficNotes} onChange={e => setFormData({...formData, trafficNotes: e.target.value})} className={`w-full p-2.5 rounded-lg outline-none min-h-[80px] ${canEditTraffic ? 'border border-blue-200 bg-blue-50/30 focus:ring-2 focus:ring-blue-500' : 'border border-slate-300 bg-slate-100 text-slate-500 cursor-not-allowed'}`}></textarea>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-purple-700 mb-1 flex justify-between items-center">Obs: CS {!canEditCS && <span className="text-[9px] text-slate-400 font-normal uppercase bg-slate-200 px-1 rounded flex items-center gap-1"><Lock size={10}/></span>}</label>
                                                    <textarea readOnly={!canEditCS} value={formData.csNotes} onChange={e => setFormData({...formData, csNotes: e.target.value})} className={`w-full p-2.5 rounded-lg outline-none min-h-[80px] ${canEditCS ? 'border border-purple-200 bg-purple-50/30 focus:ring-2 focus:ring-purple-500' : 'border border-slate-300 bg-slate-100 text-slate-500 cursor-not-allowed'}`}></textarea>
                                                </div>
                                                <div>
                                                    <label className="block text-xs font-bold text-slate-700 mb-1 flex justify-between items-center">Obs: Gerais {!canEditGeneral && <span className="text-[9px] text-slate-400 font-normal uppercase bg-slate-200 px-1 rounded flex items-center gap-1"><Lock size={10}/></span>}</label>
                                                    <textarea readOnly={!canEditGeneral} value={formData.generalNotes} onChange={e => setFormData({...formData, generalNotes: e.target.value})} className={`w-full p-2.5 rounded-lg outline-none min-h-[80px] ${canEditGeneral ? 'border border-slate-300 focus:ring-2 focus:ring-slate-500' : 'border border-slate-300 bg-slate-100 text-slate-500 cursor-not-allowed'}`}></textarea>
                                                </div>
                                            </div>
                                        </div>
                                    </section>
                                </form>
                            </div>
                            <div className="p-6 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 rounded-b-xl mt-auto">
                                <button onClick={() => setIsFormOpen(false)} type="button" className="px-5 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50">Cancelar</button>
                                <button form="client-form" type="submit" className="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700 shadow-sm">Salvar Alterações</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 flex">
                    <nav className="w-64 bg-slate-900 text-slate-300 p-4 flex flex-col fixed h-full z-20 no-print">
                        <div className="flex items-center gap-2 mb-10 px-2 pt-4">
                            <div className="bg-blue-500 p-2 rounded-lg"><TrendingUp size={24} className="text-white" /></div>
                            <div><h1 className="text-xl font-bold text-white leading-tight">Agência360</h1><p className="text-[10px] text-slate-400 uppercase tracking-widest">{isMaster ? 'Painel Master' : `Painel ${currentUser.accessLevel}`}</p></div>
                        </div>

                        <div className="space-y-2 flex-1">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><LayoutDashboard size={20} /><span className="font-medium">Dashboard</span></button>
                            <button onClick={() => setActiveTab('clients')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'clients' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><Building2 size={20} /><span className="font-medium">Franquias & Contas</span></button>
                            <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'reports' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><FileText size={20} /><span className="font-medium">Relatórios</span></button>
                            {isMaster && <button onClick={() => setActiveTab('team')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'team' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}><Shield size={20} /><span className="font-medium">Equipe & Acessos</span></button>}
                        </div>

                        <div className="border-t border-slate-800 pt-4 mt-auto">
                            <div className="mb-4">
                                <label className="text-[10px] uppercase font-bold text-slate-500 mb-1 block px-2">Simulador de Visão</label>
                                <select value={activeUserId} onChange={(e) => { setActiveUserId(Number(e.target.value)); setActiveTab('dashboard'); }} className="w-full bg-slate-800 border border-slate-700 text-sm text-slate-300 rounded-lg p-2 outline-none">
                                    {team.map(m => <option key={m.id} value={m.id}>{m.name} ({m.accessLevel})</option>)}
                                </select>
                            </div>
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-sm font-bold text-white">{currentUser.name.charAt(0)}</div>
                                <div><p className="text-sm font-medium text-white">{currentUser.name}</p><p className="text-xs text-slate-500">{currentUser.role}</p></div>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 ml-64 p-8 overflow-y-auto w-full">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && DashboardView()}
                            {activeTab === 'clients' && ClientsView()}
                            {activeTab === 'reports' && ReportsView()}
                            {activeTab === 'team' && isMaster && TeamView()}
                        </div>
                    </main>

                    {ClientDetailsModal()}
                    {ClientFormModal()}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
