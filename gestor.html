<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Gestor - Agência360</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Oculta o menu lateral e formata a página para impressão A4 do Relatório */
        @media print {
            body { background: white !important; }
            nav, .no-print { display: none !important; }
            main { margin-left: 0 !important; padding: 0 !important; width: 100% !important; overflow: visible !important; }
            .print-document { box-shadow: none !important; border: none !important; max-width: 100% !important; margin: 0 !important; }
            ::-webkit-scrollbar { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, LineChart, Line } from 'https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0';
        
        import * as LucideIcons from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';
        const { 
            LayoutDashboard, Users, TrendingUp, AlertCircle, CheckCircle, 
            Search, Plus, X, Building2, MapPin, Target, DollarSign, 
            Briefcase, Activity, Edit, Calendar, Phone, Info, Flag, Megaphone, FileText, Printer,
            Globe, Instagram, MessageCircle, FileBadge, Paperclip, Download
        } = LucideIcons;

        const mockPerformanceData = [

            { name: 'Fev', leads: 300, investimento: 1398 },
            { name: 'Mar', leads: 200, investimento: 9800 },
            { name: 'Abr', leads: 278, investimento: 3908 },
            { name: 'Mai', leads: 189, investimento: 4800 },
            { name: 'Jun', leads: 239, investimento: 3800 },
            { name: 'Jul', leads: 349, investimento: 4300 },
        ];

        const initialClients = [
            {
                id: 1,
                companyName: 'Vaapty Franchising',

                legalResponsible: 'João da Silva',
                address: 'Av. Madre Leônia Milito, 1500 - Londrina, PR',
                servicesContracted: ['Gestão de Tráfego', 'Consultoria de Vendas'],
                investmentDetails: { monthlyGoogle: 3000, monthlyMeta: 7000, pixFrequency: 'Semanal (1x)', pixDays: ['Segunda'] },
                performanceMetrics: { leadsGoal: 100, leadsGenerated: 45, cplTarget: 30, currentCpl: 33.3, salesClosed: 2 },
                targeting: { audience: 'Investidores locais, Empresários 30-55 anos', region: 'Londrina e região metropolitana (Raio 30km)' },
                notes: 'Foco atual é gerar leads B2B para expansão local.',
                campaignLogs: [
                    { id: 1, date: '2026-07-10', note: 'Otimização de lances no Google Ads. Custo estava alto.' },
                    { id: 2, date: '2026-07-15', note: 'Subimos 3 novos criativos no Meta focados em B2B.' }
                ],
                cnpj: '12.345.678/0001-90', website: 'https://vaapty.com.br', instagram: '@vaapty', whatsapp: '(43) 99999-9999',
                satisfactionIndex: 'Satisfied',
                assignedTeam: { cs: 'Ana Costa', trafficManager: 'Carlos Mendes' },
                storeStatus: 'Aberto',
                createdAt: '2024-01-15'
            },
            {
                id: 3,
                companyName: 'Academia XYZ',
                franchiseId: 'XYZ-012',
                legalResponsible: 'Marcos Paulo',
                address: 'Av. Brasil, 800 - São Paulo, SP',
                servicesContracted: ['Gestão de Tráfego'],
                investmentDetails: { monthlyGoogle: 0, monthlyMeta: 4000, pixFrequency: 'Diário', pixDays: ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'] },
                performanceMetrics: { leadsGoal: 200, leadsGenerated: 210, cplTarget: 15, currentCpl: 14.2, salesClosed: 40 },
                targeting: { audience: 'Jovens e adultos 18-40 anos', region: 'São Paulo capital' },
                notes: '', 
                campaignLogs: [],
                cnpj: '', website: '', instagram: '', whatsapp: '',
                storeStatus: 'Aberto',
                satisfactionIndex: 'Satisfied',
                assignedTeam: { cs: 'Ana Costa', trafficManager: 'Carlos Mendes' },
                createdAt: '2024-03-05'
            },
            {
                id: 4,
                companyName: 'Vaapty Maringá',
                franchiseId: 'VPTY-089',
                legalResponsible: 'Carlos Eduardo',
                address: 'Av. Tiradentes, 500 - Maringá, PR',
                storeStatus: 'Em Inauguração',
                inaugurationDate: '2026-09-15', awarenessStartDate: '2026-08-15', performanceStartDate: '2026-09-01',
                servicesContracted: ['Gestão de Tráfego'],
                investmentDetails: { monthlyGoogle: 2000, monthlyMeta: 5000, pixFrequency: 'Diário', pixDays: ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'] },
                performanceMetrics: { leadsGoal: 100, leadsGenerated: 0, cplTarget: 25, currentCpl: 0, salesClosed: 0 },
                targeting: { audience: 'Proprietários de veículos', region: 'Maringá e raio 20km' },
                notes: 'Aquecimento de conta e campanha de reconhecimento 30 dias antes.',
                campaignLogs: [
                    { id: 3, date: '2026-07-17', note: 'Setup inicial de contas, pixels criados e tags instaladas.' }
                ],
                cnpj: '00.111.222/0001-33', website: 'https://vaapty.com.br/maringa', instagram: '@vaapty.maringa', whatsapp: '(44) 99999-0000',
                satisfactionIndex: 'Neutral',
                assignedTeam: { cs: 'Roberto Almeida', trafficManager: 'Carlos Mendes' },
                createdAt: '2026-07-17'
            }
        ];

        // Usuário logado fisicamente neste arquivo (Gestor de Tráfego)
        const loggedInManager = { 
            name: 'Carlos Mendes', 
            role: 'Gestor de Tráfego', 
            email: 'carlos.mendes@agencia.com',
            avatar: 'CM'
        };

        // Lista de equipe apenas para popular os campos "Select"
        const agencyTeamList = [
            { id: 1, name: 'Ana Costa', role: 'Customer Success (CS)' },
            { id: 2, name: 'Carlos Mendes', role: 'Gestor de Tráfego' },
            { id: 3, name: 'Roberto Almeida', role: 'Customer Success (CS)' },
            { id: 4, name: 'Felipe Silva', role: 'Gestor de Tráfego' }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [clients, setClients] = useState(initialClients);
            const [selectedClient, setSelectedClient] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            
            // Filtro Blindado: O Gestor só enxerga as próprias contas
            const myClients = clients.filter(c => 
                c.assignedTeam.trafficManager === loggedInManager.name || 
                c.assignedTeam.cs === loggedInManager.name
            );

            // Report States (Incluindo os novos campos manuais do gestor)
            const [reportConfig, setReportConfig] = useState({ 
                client: '', startDate: '', endDate: '', 
                leadsManual: 0, cplManual: 0, salesManual: 0, notesManual: '', attachment: null
            });
            const [generatedReport, setGeneratedReport] = useState(null);

            const [logFormData, setLogFormData] = useState({
                clientId: '', date: new Date().toISOString().split('T')[0], note: '', attachment: null
            });

            // Client Form States
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            const [formData, setFormData] = useState({
                name: '', franchiseName: '', legalResponsible: '', address: '', cs: '', trafficManager: loggedInManager.name,
                monthlyGoogle: 0, monthlyMeta: 0, pixFrequency: 'Semanal (1x)', pixDays: [], leadsGoal: 0, cplTarget: 0, leadsGenerated: 0, currentCpl: 0, salesClosed: 0, satisfactionIndex: 'Satisfied',
                audience: '', region: '', notes: '', storeStatus: 'Aberto', inaugurationDate: '', awarenessStartDate: '', performanceStartDate: '',
                cnpj: '', website: '', instagram: '', whatsapp: '',
                campaignLogs: [], newLogDate: new Date().toISOString().split('T')[0], newLogText: ''
            });

            const getSatisfactionColor = (status) => {
                switch(status) {
                    case 'Satisfied': return 'text-emerald-500 bg-emerald-50 border-emerald-200';
                    case 'Neutral': return 'text-amber-500 bg-amber-50 border-amber-200';
                    case 'Needs Attention': return 'text-rose-500 bg-rose-50 border-rose-200';
                    default: return 'text-slate-500 bg-slate-50 border-slate-200';
                }
            };

            const SatisfactionBadge = ({ status }) => (
                <span className={`px-2.5 py-1 rounded-full text-xs font-semibold border ${getSatisfactionColor(status)} flex items-center gap-1.5 w-max`}>
                    {status === 'Satisfied' && <CheckCircle size={14} />}
                    {status === 'Needs Attention' && <AlertCircle size={14} />}
                    {status === 'Neutral' && <Activity size={14} />}
                    {status === 'Satisfied' ? 'Satisfeito' : status === 'Needs Attention' ? 'Atenção Requerida' : 'Neutro'}
                </span>
            );

            const calculateFinances = (google, meta) => {
                const googleNum = Number(google) || 0;
                const metaNum = Number(meta) || 0;
                const totalMonthly = googleNum + metaNum;
                const weeklyGoogle = googleNum / 4;
                const weeklyMetaGross = metaNum / 4;
                const weeklyMetaNet = weeklyMetaGross * (1 - 0.1215); 
                return { totalMonthly, weeklyGoogle, weeklyMetaGross, weeklyMetaNet };
            };

            const handleOpenForm = (client = null) => {
                if (client) {
                    setEditingClient(client.id);
                    setFormData({
                        name: client.companyName, franchiseName: client.franchiseId || '', legalResponsible: client.legalResponsible || '', address: client.address || '',
                        cs: client.assignedTeam.cs, trafficManager: client.assignedTeam.trafficManager,
                        monthlyGoogle: client.investmentDetails.monthlyGoogle, monthlyMeta: client.investmentDetails.monthlyMeta,
                        pixFrequency: client.investmentDetails.pixFrequency || 'Semanal (1x)', pixDays: client.investmentDetails.pixDays || [],
                        leadsGoal: client.performanceMetrics.leadsGoal, cplTarget: client.performanceMetrics.cplTarget, leadsGenerated: client.performanceMetrics.leadsGenerated || 0, currentCpl: client.performanceMetrics.currentCpl || 0, salesClosed: client.performanceMetrics.salesClosed || 0, satisfactionIndex: client.satisfactionIndex,
                        audience: client.targeting?.audience || '', region: client.targeting?.region || '', notes: client.notes || '',
                        storeStatus: client.storeStatus || 'Aberto', inaugurationDate: client.inaugurationDate || '', awarenessStartDate: client.awarenessStartDate || '', performanceStartDate: client.performanceStartDate || '',
                        cnpj: client.cnpj || '', website: client.website || '', instagram: client.instagram || '', whatsapp: client.whatsapp || '',
                        campaignLogs: client.campaignLogs || []
                    });
                } else {
                    setEditingClient(null);
                    setFormData({
                        name: '', franchiseName: '', legalResponsible: '', address: '', cs: '', trafficManager: loggedInManager.name,
                        monthlyGoogle: 0, monthlyMeta: 0, pixFrequency: 'Semanal (1x)', pixDays: [], leadsGoal: 0, cplTarget: 0, leadsGenerated: 0, currentCpl: 0, salesClosed: 0, satisfactionIndex: 'Satisfied',
                        audience: '', region: '', notes: '', storeStatus: 'Aberto', inaugurationDate: '', awarenessStartDate: '', performanceStartDate: '',
                        cnpj: '', website: '', instagram: '', whatsapp: '',
                        campaignLogs: []
                    });
                }
                setIsFormOpen(true);
            };

            const handleSaveClient = (e) => {
                e.preventDefault();

                const newClientData = {
                    companyName: formData.name, franchiseId: formData.franchiseName || `NEW-${Math.floor(Math.random()*1000)}`,
                    legalResponsible: formData.legalResponsible, address: formData.address,
                    storeStatus: formData.storeStatus, inaugurationDate: formData.inaugurationDate, awarenessStartDate: formData.awarenessStartDate, performanceStartDate: formData.performanceStartDate,
                    servicesContracted: ['Gestão de Tráfego'], 
                    investmentDetails: { monthlyGoogle: Number(formData.monthlyGoogle), monthlyMeta: Number(formData.monthlyMeta), pixFrequency: formData.pixFrequency, pixDays: formData.pixDays },
                    performanceMetrics: {
                        leadsGoal: Number(formData.leadsGoal), cplTarget: Number(formData.cplTarget),
                        leadsGenerated: Number(formData.leadsGenerated), currentCpl: Number(formData.currentCpl), salesClosed: Number(formData.salesClosed)
                    },
                    targeting: { audience: formData.audience, region: formData.region }, notes: formData.notes, campaignLogs: formData.campaignLogs,
                    cnpj: formData.cnpj, website: formData.website, instagram: formData.instagram, whatsapp: formData.whatsapp,
                    satisfactionIndex: formData.satisfactionIndex, assignedTeam: { cs: formData.cs, trafficManager: formData.trafficManager },
                    createdAt: editingClient ? clients.find(c => c.id === editingClient).createdAt : new Date().toISOString().split('T')[0]
                };

                if (editingClient) {
                    setClients(clients.map(c => c.id === editingClient ? { ...c, ...newClientData } : c));
                } else {
                    setClients([...clients, { ...newClientData, id: clients.length + 1 }]);
                }
                setIsFormOpen(false);
            };

            const totalInvestment = myClients.reduce((acc, curr) => acc + curr.investmentDetails.monthlyGoogle + curr.investmentDetails.monthlyMeta, 0);
            const totalLeads = myClients.reduce((acc, curr) => acc + curr.performanceMetrics.leadsGenerated, 0);
            const averageCpl = myClients.length ? (myClients.reduce((acc, curr) => acc + curr.performanceMetrics.currentCpl, 0) / myClients.length).toFixed(2) : "0.00";
            const clientsNeedingAttention = myClients.filter(c => c.satisfactionIndex === 'Needs Attention').length;
            const activeStores = myClients.filter(c => c.storeStatus === 'Aberto' || !c.storeStatus).length;
            const inauguratingStores = myClients.filter(c => c.storeStatus === 'Em Inauguração').length;

            const DashboardView = () => (
                <div className="space-y-6">
                    <div>
                        <h2 className="text-2xl font-bold text-slate-800">Visão Geral das Minhas Contas</h2>
                        <p className="text-sm text-slate-500">Acompanhamento consolidado da sua carteira de clientes.</p>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                            <div className="p-3 bg-blue-50 text-blue-600 rounded-lg"><DollarSign size={24} /></div>
                            <div><p className="text-sm font-medium text-slate-500">Meu Total Gerenciado</p><h3 className="text-2xl font-bold text-slate-800">{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(totalInvestment)}</h3></div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                            <div className="p-3 bg-purple-50 text-purple-600 rounded-lg"><Users size={24} /></div>
                            <div><p className="text-sm font-medium text-slate-500">Leads na Minha Base</p><h3 className="text-2xl font-bold text-slate-800">{totalLeads}</h3></div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                            <div className="p-3 bg-emerald-50 text-emerald-600 rounded-lg"><Target size={24} /></div>
                            <div><p className="text-sm font-medium text-slate-500">Meu CPL Médio</p><h3 className="text-2xl font-bold text-slate-800">R$ {averageCpl}</h3></div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                            <div className="p-3 bg-rose-50 text-rose-600 rounded-lg"><AlertCircle size={24} /></div>
                            <div><p className="text-sm font-medium text-slate-500">Contas em Risco</p><h3 className="text-2xl font-bold text-slate-800">{clientsNeedingAttention}</h3></div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                            <div className="p-3 bg-indigo-50 text-indigo-600 rounded-lg"><Building2 size={24} /></div>
                            <div><p className="text-sm font-medium text-slate-500">Minhas Contas Ativas</p><h3 className="text-2xl font-bold text-slate-800">{activeStores}</h3></div>
                        </div>
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                            <div className="p-3 bg-amber-50 text-amber-600 rounded-lg"><Flag size={24} /></div>
                            <div><p className="text-sm font-medium text-slate-500">Lojas Inaugurando</p><h3 className="text-2xl font-bold text-slate-800">{inauguratingStores}</h3></div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h3 className="text-lg font-bold text-slate-800 mb-4">Minha Evolução (Invest. vs Leads)</h3>
                            <div className="h-72">
                                <ResponsiveContainer width="100%" height="100%">
                                    <LineChart data={mockPerformanceData}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                        <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fill: '#64748b'}} />
                                        <YAxis yAxisId="left" axisLine={false} tickLine={false} tick={{fill: '#64748b'}} />
                                        <YAxis yAxisId="right" orientation="right" axisLine={false} tickLine={false} tick={{fill: '#64748b'}} />
                                        <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}}/>
                                        <Legend />
                                        <Line yAxisId="left" type="monotone" dataKey="leads" stroke="#8b5cf6" strokeWidth={3} dot={{r: 4}} activeDot={{r: 6}} name="Leads" />
                                        <Line yAxisId="right" type="monotone" dataKey="investimento" stroke="#3b82f6" strokeWidth={3} dot={{r: 4}} name="Investimento (R$)" />
                                    </LineChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                            <h3 className="text-lg font-bold text-slate-800 mb-4">Saúde da Minha Carteira</h3>
                            <div className="space-y-4">
                                {['Satisfied', 'Neutral', 'Needs Attention'].map((status) => {
                                    const count = myClients.filter(c => c.satisfactionIndex === status).length;
                                    const percent = myClients.length ? (count / myClients.length) * 100 : 0;
                                    const colors = { 'Satisfied': 'bg-emerald-500', 'Neutral': 'bg-amber-500', 'Needs Attention': 'bg-rose-500' };
                                    const labels = { 'Satisfied': 'Saudáveis / Satisfeitos', 'Neutral': 'Acompanhamento Necessário', 'Needs Attention': 'Risco de Churn / Críticos' };
                                    
                                    return (
                                        <div key={status}>
                                            <div className="flex justify-between text-sm mb-1">
                                                <span className="font-medium text-slate-700">{labels[status]}</span>
                                                <span className="text-slate-500">{count} contas ({percent.toFixed(0)}%)</span>
                                            </div>
                                            <div className="w-full bg-slate-100 rounded-full h-2">
                                                <div className={`${colors[status]} h-2 rounded-full`} style={{ width: `${percent}%` }}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );

            const ClientsView = () => (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Minhas Contas</h2>
                            <p className="text-sm text-slate-500 mt-1">Gerencie estratégias, orçamentos e detalhes dos clientes da sua carteira.</p>
                        </div>
                        <button onClick={() => handleOpenForm()} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm">
                            <Plus size={18} /> Nova Conta
                        </button>
                    </div>

                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-4 border-b border-slate-200 flex gap-4 bg-slate-50">
                            <div className="relative flex-1">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                <input 
                                    type="text" placeholder="Buscar nas minhas contas (nome, ID)..." 
                                    value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                />
                            </div>
                        </div>
                        
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200">
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Empresa / Franquia</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Squad Alocada</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Orçamento (Mês)</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Saúde da Conta</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {myClients.filter(c => c.companyName.toLowerCase().includes(searchTerm.toLowerCase()) || c.franchiseId.toLowerCase().includes(searchTerm.toLowerCase())).map((client) => (
                                        <tr key={client.id} className="hover:bg-slate-50/80 transition-colors cursor-pointer" onClick={() => setSelectedClient(client)}>
                                            <td className="p-4">
                                                <div className="font-semibold text-slate-800">{client.companyName}</div>
                                                <div className="text-xs text-slate-500 font-medium">{client.franchiseId || 'Sem ID'}</div>
                                            </td>
                                            <td className="p-4">
                                                {client.storeStatus === 'Em Inauguração' ? (
                                                    <span className="px-2 py-1 bg-amber-100 text-amber-700 text-[10px] font-bold rounded flex items-center gap-1 w-max"><Flag size={10}/> EM INAUGURAÇÃO</span>
                                                ) : (
                                                    <span className="text-sm text-slate-600">Em Operação</span>
                                                )}
                                            </td>
                                            <td className="p-4">
                                                <div className="flex flex-col gap-1">
                                                    <span className="text-xs font-medium text-slate-600 flex items-center gap-1"><span className="bg-blue-100 text-blue-700 px-1.5 rounded text-[10px] font-bold">CS</span> {client.assignedTeam.cs}</span>
                                                    <span className={`text-xs font-medium flex items-center gap-1 ${client.assignedTeam.trafficManager === loggedInManager.name ? 'text-slate-800 font-bold' : 'text-slate-600'}`}><span className="bg-purple-100 text-purple-700 px-1.5 rounded text-[10px] font-bold">TR</span> {client.assignedTeam.trafficManager}</span>
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <div className="text-sm font-semibold text-slate-800">{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(client.investmentDetails.monthlyGoogle + client.investmentDetails.monthlyMeta)}</div>
                                                <div className="text-xs text-slate-500">Google + Meta</div>
                                            </td>
                                            <td className="p-4">
                                                <SatisfactionBadge status={client.satisfactionIndex} />
                                            </td>
                                            <td className="p-4 text-right">
                                                <button onClick={(e) => { e.stopPropagation(); handleOpenForm(client); }} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                                                    <Edit size={18} />

                            </div>
                            <div className="p-6 border-t border-slate-200 bg-slate-50 flex justify-end gap-3 rounded-b-xl mt-auto">
                                <button onClick={() => setIsFormOpen(false)} type="button" className="px-5 py-2.5 text-sm font-semibold text-slate-600 bg-white border border-slate-300 rounded-lg hover:bg-slate-50">Cancelar</button>
                                <button form="client-form" type="submit" className="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 rounded-lg hover:bg-blue-700">Salvar Dados</button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 flex">
                    <nav className="w-64 bg-slate-900 text-slate-300 p-4 flex flex-col fixed h-full z-20 no-print">
                        <div className="flex items-center gap-2 mb-10 px-2 pt-4">
                            <div className="bg-blue-500 p-2 rounded-lg"><TrendingUp size={24} className="text-white" /></div>
                            <div>
                                <h1 className="text-xl font-bold text-white leading-tight">Agência360</h1>
                                <p className="text-[10px] text-slate-400 uppercase tracking-widest">Painel Operacional</p>
                            </div>
                        </div>

                        <div className="space-y-2 flex-1">
                            <button onClick={() => setActiveTab('dashboard')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <LayoutDashboard size={20} /> <span className="font-medium">Meu Dashboard</span>
                            </button>
                            <button onClick={() => setActiveTab('clients')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'clients' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <Building2 size={20} /> <span className="font-medium">Minhas Contas</span>
                            </button>
                            <button onClick={() => setActiveTab('reports')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'reports' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <FileText size={20} /> <span className="font-medium">Meus Relatórios</span>
                            </button>
                            <button onClick={() => setActiveTab('logs')} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors ${activeTab === 'logs' ? 'bg-blue-600 text-white' : 'hover:bg-slate-800 hover:text-white'}`}>
                                <Calendar size={20} /> <span className="font-medium">Diário (Logs)</span>
                            </button>
                        </div>

                        <div className="border-t border-slate-800 pt-4 mt-auto">
                            <div className="flex items-center gap-3 px-2">
                                <div className="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center text-sm font-bold text-white">
                                    {loggedInManager.avatar}
                                </div>
                                <div>
                                    <p className="text-sm font-medium text-white">{loggedInManager.name}</p>
                                    <p className="text-xs text-slate-500">{loggedInManager.role}</p>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 ml-64 p-8 overflow-y-auto w-full">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && DashboardView()}
                            {activeTab === 'clients' && ClientsView()}
                            {activeTab === 'reports' && ReportsView()}
                            {activeTab === 'logs' && LogsView()}
                        </div>
                    </main>

                    {renderClientDetailsModal()}
                    {renderClientFormModal()}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
