<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Gestor - Agência360</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        
        @media print {
            body { background: white !important; }
            nav, .no-print { display: none !important; }
            main { margin-left: 0 !important; padding: 0 !important; width: 100% !important; overflow: visible !important; }
            .print-document { box-shadow: none !important; border: none !important; max-width: 100% !important; margin: 0 !important; }
            ::-webkit-scrollbar { display: none; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } from 'https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0';
        import * as LucideIcons from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0';
        
        const { 
            LayoutDashboard, Users, TrendingUp, AlertCircle, CheckCircle, 
            Search, Plus, X, Building2, MapPin, Target, DollarSign, 
            Briefcase, Activity, Edit, Calendar, Phone, Info, Flag, Megaphone, FileText, Printer,
            Globe, Instagram, MessageCircle, FileBadge, Paperclip, Save, Download, Clock
        } = LucideIcons;

        const initialClients = [
            {
                id: 1, companyName: 'Vaapty Franchising', franchiseId: 'VPTY-001', legalResponsible: 'João da Silva',
                address: 'Av. Madre Leônia Milito, 1500 - Londrina, PR', servicesContracted: ['Gestão de Tráfego', 'Consultoria de Vendas'],
                investmentDetails: { monthlyGoogle: 3000, monthlyMeta: 7000, pixFrequency: 'Semanal (1x)', pixDays: ['Sexta'] },
                performanceMetrics: { leadsGoal: 100, leadsGenerated: 45, cplTarget: 30, currentCpl: 33.3, salesClosed: 2 },
                targeting: { audience: 'Investidores locais, Empresários 30-55 anos', region: 'Londrina e região metropolitana' },
                notes: 'Foco atual é gerar leads B2B para expansão local. Não usar imagens genéricas nos criativos.',
                cnpj: '12.345.678/0001-90', website: 'https://vaapty.com.br', instagram: '@vaapty', whatsapp: '(43) 99999-9999',
                satisfactionIndex: 'Satisfied', assignedTeam: { cs: 'Ana Costa', trafficManager: 'Carlos Mendes' }, createdAt: '2024-01-15'
            },
            {
                id: 3, companyName: 'Academia XYZ', franchiseId: 'XYZ-012', legalResponsible: 'Marcos Paulo',
                address: 'Av. Brasil, 800 - São Paulo, SP', servicesContracted: ['Gestão de Tráfego'],
                investmentDetails: { monthlyGoogle: 0, monthlyMeta: 4000, pixFrequency: 'Diário', pixDays: ['Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta'] },
                performanceMetrics: { leadsGoal: 200, leadsGenerated: 210, cplTarget: 15, currentCpl: 14.2, salesClosed: 40 },
                targeting: { audience: 'Jovens e adultos 18-40 anos, fitness, musculação', region: 'São Paulo capital' },
                notes: '', cnpj: '44.555.666/0001-77', website: 'https://academiaxyz.com.br', instagram: '@academiaxyz', whatsapp: '(11) 97777-7777',
                satisfactionIndex: 'Satisfied', assignedTeam: { cs: 'Ana Costa', trafficManager: 'Carlos Mendes' }, createdAt: '2024-03-05'
            }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [clients, setClients] = useState(initialClients);
            const [selectedClient, setSelectedClient] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [logs, setLogs] = useState([]);
            const [reportsHistory, setReportsHistory] = useState([]);
            
            // Controle de Tempo e PIX
            const [currentTime, setCurrentTime] = useState(new Date());
            const [pixChecklist, setPixChecklist] = useState({});

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Simulador de usuário (Fixo no Gestor)
            const currentUser = { id: 2, name: 'Carlos Mendes', role: 'Gestor de Tráfego', accessLevel: 'Líder' };
            
            // Formulários e Modais
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingClient, setEditingClient] = useState(null);
            
            // Form state para Dossiê
            const [formData, setFormData] = useState({
                name: '', franchiseName: '', legalResponsible: '', address: '',
                monthlyGoogle: 0, monthlyMeta: 0, pixFrequency: 'Semanal (1x)', pixDays: [], leadsGoal: 0, cplTarget: 0, satisfactionIndex: 'Satisfied',
                audience: '', region: '', notes: '', storeStatus: 'Aberto', inaugurationDate: '', awarenessStartDate: '', performanceStartDate: '',
                cnpj: '', website: '', instagram: '', whatsapp: ''
            });

            // Form state para Relatório Manual
            const [reportConfig, setReportConfig] = useState({ 
                client: '', startDate: '', endDate: '', 
                leadsGenerated: '', currentCpl: '', salesClosed: '', 
                weeklyInvestment: '', notes: '', attachment: null 
            });
            const [generatedReport, setGeneratedReport] = useState(null);

            // Form state para Logs
            const [logForm, setLogForm] = useState({ client: '', date: new Date().toISOString().split('T')[0], action: '', attachment: null });

            const weekDaysMap = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
            const currentDayString = weekDaysMap[currentTime.getDay()];
            const isAlertTime = currentTime.getHours() >= 17;

            const calculateFinances = (google, meta) => {
                const googleNum = Number(google) || 0;
                const metaNum = Number(meta) || 0;
                return {
                    totalMonthly: googleNum + metaNum,
                    weeklyGoogle: googleNum / 4,
                    weeklyMetaGross: metaNum / 4,
                    weeklyMetaNet: (metaNum / 4) * (1 - 0.1215)
                };
            };

            const getSatisfactionColor = (status) => {
                switch(status) {
                    case 'Satisfied': return 'text-emerald-500 bg-emerald-50 border-emerald-200';
                    case 'Neutral': return 'text-amber-500 bg-amber-50 border-amber-200';
                    case 'Needs Attention': return 'text-rose-500 bg-rose-50 border-rose-200';
                    default: return 'text-slate-500 bg-slate-50 border-slate-200';
                }
            };

            const SatisfactionBadge = ({ status }) => (
                <span className={`px-2.5 py-1 rounded-full text-xs font-semibold border ${getSatisfactionColor(status)} flex items-center gap-1.5 w-max`}>
                    {status === 'Satisfied' && <CheckCircle size={14} />}
                    {status === 'Needs Attention' && <AlertCircle size={14} />}
                    {status === 'Neutral' && <Activity size={14} />}
                    {status === 'Satisfied' ? 'Satisfeito' : status === 'Needs Attention' ? 'Atenção Requerida' : 'Neutro'}
                </span>
            );

            const DashboardView = () => {
                const totalInvestment = clients.reduce((acc, curr) => acc + curr.investmentDetails.monthlyGoogle + curr.investmentDetails.monthlyMeta, 0);
                const totalLeads = clients.reduce((acc, curr) => acc + curr.performanceMetrics.leadsGenerated, 0);
                const averageCpl = clients.length ? (clients.reduce((acc, curr) => acc + curr.performanceMetrics.currentCpl, 0) / clients.length).toFixed(2) : "0.00";
                const activeStores = clients.filter(c => c.storeStatus === 'Aberto' || !c.storeStatus).length;
                const inauguratingStores = clients.filter(c => c.storeStatus === 'Em Inauguração').length;
                const clientsNeedingAttention = clients.filter(c => c.satisfactionIndex === 'Needs Attention').length;

                // Dados do Gráfico Funil/Donut (Apenas lojas abertas)
                const openClients = clients.filter(c => c.storeStatus !== 'Em Inauguração');
                const goalsHit = openClients.filter(c => c.performanceMetrics.leadsGenerated >= c.performanceMetrics.leadsGoal).length;
                const goalsMissed = openClients.length - goalsHit;
                
                const pieData = [
                    { name: 'Meta Batida', value: goalsHit, color: '#10b981' },
                    { name: 'Abaixo da Meta', value: goalsMissed, color: '#f43f5e' }
                ];

                const clientsNeedingPix = clients.filter(c => c.investmentDetails.pixDays?.includes(currentDayString));
                const uncheckedPix = clientsNeedingPix.filter(c => !pixChecklist[c.id]).length;
                const showRedAlert = isAlertTime && uncheckedPix > 0;

                return (
                    <div className="space-y-6">
                        <div className="flex justify-between items-end">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800">Visão Geral da Carteira</h2>
                                <p className="text-sm text-slate-500">Métricas consolidadas das suas contas ativas.</p>
                            </div>
                            <div className="text-right bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                                <div>
                                    <p className="text-xs font-bold text-slate-400 uppercase">{currentTime.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</p>
                                    <p className="text-xl font-black text-slate-800 flex items-center justify-end gap-1.5">
                                        <Clock size={20} className="text-blue-500"/> 
                                        {currentTime.toLocaleTimeString('pt-BR')} <span className="text-xs font-medium text-slate-400">BRT</span>
                                    </p>
                                </div>
                            </div>
                        </div>

                        {showRedAlert && (
                            <div className="bg-red-600 text-white p-4 rounded-xl shadow-lg flex items-center gap-3 animate-pulse">
                                <AlertCircle size={28} />
                                <div>
                                    <h4 className="font-bold text-lg">ALERTA DE HORÁRIO: PIX Pendentes!</h4>
                                    <p className="text-sm text-red-100">Já são 17:00h e você tem <strong>{uncheckedPix} cliente(s)</strong> sem confirmação de PIX na checklist abaixo. Verifique os comprovantes.</p>
                                </div>
                            </div>
                        )}
                        
                        {/* KPI Cards */}
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                                <div className="p-3 bg-blue-50 text-blue-600 rounded-lg"><DollarSign size={24} /></div>
                                <div>
                                    <p className="text-sm font-medium text-slate-500">Orçamento Gerenciado</p>
                                    <h3 className="text-2xl font-bold text-slate-800">{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(totalInvestment)}</h3>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                                <div className="p-3 bg-purple-50 text-purple-600 rounded-lg"><Users size={24} /></div>
                                <div><p className="text-sm font-medium text-slate-500">Leads Gerados (Total)</p><h3 className="text-2xl font-bold text-slate-800">{totalLeads}</h3></div>
                            </div>
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                                <div className="p-3 bg-emerald-50 text-emerald-600 rounded-lg"><Target size={24} /></div>
                                <div><p className="text-sm font-medium text-slate-500">CPL Médio da Carteira</p><h3 className="text-2xl font-bold text-slate-800">R$ {averageCpl}</h3></div>
                            </div>
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                                <div className="p-3 bg-indigo-50 text-indigo-600 rounded-lg"><Building2 size={24} /></div>
                                <div><p className="text-sm font-medium text-slate-500">Lojas Ativas</p><h3 className="text-2xl font-bold text-slate-800">{activeStores}</h3></div>
                            </div>
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                                <div className="p-3 bg-amber-50 text-amber-600 rounded-lg"><Flag size={24} /></div>
                                <div><p className="text-sm font-medium text-slate-500">Em Inauguração</p><h3 className="text-2xl font-bold text-slate-800">{inauguratingStores}</h3></div>
                            </div>
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-start gap-4">
                                <div className="p-3 bg-rose-50 text-rose-600 rounded-lg"><AlertCircle size={24} /></div>
                                <div><p className="text-sm font-medium text-slate-500">Contas em Atenção</p><h3 className="text-2xl font-bold text-slate-800">{clientsNeedingAttention}</h3></div>
                            </div>
                        </div>

                        {/* Bloco Operacional e Gráficos */}
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                            {/* Checklist de PIX Diário */}
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex flex-col">
                                <h3 className="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2"><CheckCircle size={20} className="text-emerald-500"/> Checklist de PIX - {currentDayString}</h3>
                                <p className="text-sm text-slate-500 mb-4">Controle de clientes que possuem repasse programado para hoje.</p>
                                
                                <div className="flex-1 overflow-y-auto pr-2">
                                    {clientsNeedingPix.length === 0 ? (
                                        <p className="text-sm text-slate-500 italic p-4 bg-slate-50 rounded-lg text-center">Nenhum PIX programado para a sua carteira hoje.</p>
                                    ) : (
                                        <div className="grid grid-cols-1 gap-3">
                                            {clientsNeedingPix.map(c => {
                                                return (
                                                    <label key={c.id} className={`flex items-center justify-between p-4 rounded-xl border cursor-pointer transition-colors shadow-sm ${pixChecklist[c.id] ? 'bg-emerald-50 border-emerald-300' : 'bg-white border-slate-200 hover:border-blue-300'}`}>
                                                        <div className="flex items-center gap-3">
                                                            <input 
                                                                type="checkbox" checked={!!pixChecklist[c.id]} 
                                                                onChange={(e) => setPixChecklist({...pixChecklist, [c.id]: e.target.checked})}
                                                                className="w-5 h-5 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500 cursor-pointer"
                                                            />
                                                            <div>
                                                                <p className={`text-sm font-bold ${pixChecklist[c.id] ? 'text-emerald-700 line-through opacity-70' : 'text-slate-800'}`}>{c.companyName}</p>
                                                                <p className="text-[10px] text-slate-500 font-semibold">{c.investmentDetails.pixFrequency}</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <span className={`text-[10px] uppercase font-bold px-2 py-0.5 rounded ${pixChecklist[c.id] ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}>
                                                                {pixChecklist[c.id] ? 'Confirmado' : 'Aguardando'}
                                                            </span>
                                                        </div>
                                                    </label>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Gráfico Funil */}
                            <div className="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                                <h3 className="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><Target size={20} className="text-blue-500"/> Sucesso de Metas (Lojas Ativas)</h3>
                                <div className="h-64 flex flex-col justify-center relative">
                                    {openClients.length === 0 ? (
                                        <p className="text-center text-sm text-slate-500 italic">Sem dados suficientes.</p>
                                    ) : (
                                        <ResponsiveContainer width="100%" height="100%">
                                            <PieChart>
                                                <Pie data={pieData} cx="50%" cy="50%" innerRadius={60} outerRadius={80} paddingAngle={5} dataKey="value">
                                                    {pieData.map((entry, index) => <Cell key={`cell-${index}`} fill={entry.color} />)}
                                                </Pie>
                                                <Tooltip contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                                                <Legend verticalAlign="bottom" height={36} />
                                            </PieChart>
                                        </ResponsiveContainer>
                                    )}
                                    {openClients.length > 0 && (
                                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-center -mt-4">
                                            <span className="block text-2xl font-black text-slate-800">{Math.round((goalsHit / openClients.length) * 100)}%</span>
                                            <span className="block text-[10px] font-bold text-slate-500 uppercase">Atingimento</span>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const ClientsView = () => (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div>
                            <h2 className="text-2xl font-bold text-slate-800">Minhas Contas</h2>
                            <p className="text-sm text-slate-500 mt-1">Gerencie configurações, orçamentos e estratégias da sua carteira.</p>
                        </div>
                        <button onClick={() => handleOpenForm()} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition-colors shadow-sm">
                            <Plus size={18} /> Cadastrar Nova
                        </button>
                    </div>

                    <div className="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                        <div className="p-4 border-b border-slate-200 flex gap-4 bg-slate-50">
                            <div className="relative flex-1">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={18} />
                                <input 
                                    type="text" placeholder="Buscar franquia ou ID..." 
                                    value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                    className="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                />
                            </div>
                        </div>
                        
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200">
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Empresa / Cliente</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Orçamento Total</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Leads (Atual)</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider">Saúde da Conta</th>
                                        <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">Ações</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {clients.filter(c => c.companyName.toLowerCase().includes(searchTerm.toLowerCase()) || c.franchiseId.toLowerCase().includes(searchTerm.toLowerCase())).map((client) => (
                                        <tr key={client.id} className="hover:bg-slate-50/80 transition-colors cursor-pointer" onClick={() => setSelectedClient(client)}>
                                            <td className="p-4">
                                                <div className="font-semibold text-slate-800">{client.companyName}</div>
                                                <div className="text-xs text-slate-500 font-medium">{client.franchiseId || 'Sem ID'}</div>
                                            </td>
                                            <td className="p-4">
                                                {client.storeStatus === 'Em Inauguração' ? (
                                                    <span className="px-2 py-1 bg-amber-100 text-amber-700 text-[10px] font-bold rounded flex items-center gap-1 w-max"><Flag size={10}/> EM INAUGURAÇÃO</span>
                                                ) : (
                                                    <span className="text-sm text-slate-600">Em Operação</span>
                                                )}
                                            </td>
                                            <td className="p-4">
                                                <div className="text-sm font-semibold text-slate-800">{new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(client.investmentDetails.monthlyGoogle + client.investmentDetails.monthlyMeta)}</div>
                                            </td>
                                            <td className="p-4">
                                                <div className="text-sm font-semibold text-slate-800">{client.performanceMetrics.leadsGenerated} / {client.performanceMetrics.leadsGoal}</div>
                                            </td>
                                            <td className="p-4">
                                                <SatisfactionBadge status={client.satisfactionIndex} />
                                            </td>
                                            <td className="p-4 text-right">
                                                <button onClick={(e) => { e.stopPropagation(); handleOpenForm(client); }} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                                                    <Edit size={18} />
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );

            const ReportsView = () => {
                const handleGenerateReport = (e) => {
                    e.preventDefault();
                    if (!reportConfig.client) return;
                    const client = clients.find(c => c.id === Number(reportConfig.client));
                    setGeneratedReport({ ...client, manualInputs: { ...reportConfig } });
                };

                const handleSaveToHistory = () => {
                    if (!generatedReport) return;
                    setReportsHistory([...reportsHistory, { 
                        id: Date.now(), 
                        clientId: generatedReport.id, 
                        date: new Date().toISOString(), 
                        data: generatedReport 
                    }]);
                    alert("Relatório salvo no Dossiê do Cliente com sucesso!");
                };

                return (
                    <div className="space-y-6">
                        <div className="no-print">
                            <h2 className="text-2xl font-bold text-slate-800">Fechamento e Relatórios</h2>
                            <p className="text-sm text-slate-500 mt-1">Gere o documento de prestação de contas. Preencha manualmente os resultados do período.</p>
                        </div>

                        <div className="bg-white p-5 rounded-xl border border-slate-200 shadow-sm no-print">
                            <form onSubmit={handleGenerateReport} className="space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 border-b border-slate-100 pb-6">
                                    <div>
                                        <label className="block text-xs font-semibold text-slate-600 mb-1">Cliente / Franquia</label>
                                        <select required value={reportConfig.client} onChange={e => { setReportConfig({ client: e.target.value, startDate: '', endDate: '', leadsGenerated: '', currentCpl: '', salesClosed: '', weeklyInvestment: '', notes: '', attachment: null }); setGeneratedReport(null); }} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                                            <option value="">Selecione...</option>
                                            {clients.map(c => <option key={c.id} value={c.id}>{c.companyName}</option>)}
                                        </select>
                                    </div>
                                    <div><label className="block text-xs font-semibold text-slate-600 mb-1">Data Inicial (Período)</label><input required type="date" value={reportConfig.startDate} onChange={e => setReportConfig({...reportConfig, startDate: e.target.value})} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                    <div><label className="block text-xs font-semibold text-slate-600 mb-1">Data Final (Período)</label><input required type="date" value={reportConfig.endDate} onChange={e => setReportConfig({...reportConfig, endDate: e.target.value})} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" /></div>
                                </div>

                                {reportConfig.client && (
                                    <div className="bg-blue-50/50 p-5 rounded-xl border border-blue-100 space-y-4">
                                        <h3 className="text-sm font-bold text-blue-800 flex items-center gap-2"><Target size={16}/> Lançamento Manual de Resultados</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">

                                <div><p className="text-sm font-medium text-white">{currentUser.name}</p><p className="text-xs text-slate-500">Gestor de Tráfego</p></div>
                            </div>
                        </div>
                    </nav>

                    <main className="flex-1 ml-64 p-8 overflow-y-auto w-full">
                        <div className="max-w-6xl mx-auto">
                            {activeTab === 'dashboard' && DashboardView()}
                            {activeTab === 'clients' && ClientsView()}
                            {activeTab === 'reports' && ReportsView()}
                            {activeTab === 'logs' && LogsView()}
                        </div>
                    </main>

                    {ClientDetailsModal()}
                    {ClientFormModal()}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
